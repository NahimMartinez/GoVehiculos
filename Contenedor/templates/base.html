{% load static %}
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Plataforma inteligente de reservas y gestion de flotas en tiempo real.{% endblock %}">
    <title>{% block title %}GoVehiculos | Movilidad Inteligente 2026{% endblock %}</title>

    <link rel="icon" href="{% static 'img/favicon.svg' %}" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed": "#2a1700",
                        "on-primary-fixed": "#00174b",
                        "secondary-fixed": "#ffddb8",
                        "on-tertiary-fixed": "#002113",
                        "tertiary": "#006242",
                        "primary": "#004ac6",
                        "on-secondary-fixed-variant": "#653e00",
                        "on-secondary-container": "#684000",
                        "on-background": "#191b23",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e1e2ed",
                        "inverse-on-surface": "#f0f0fb",
                        "on-surface-variant": "#434655",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#eeefff",
                        "surface": "#faf8ff",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e1e2ed",
                        "outline": "#737686",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#ffb95f",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-dim": "#d9d9e5",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-low": "#f3f3fe",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e7e7f3",
                        "primary-container": "#2563eb",
                        "outline-variant": "#c3c6d7",
                        "surface-bright": "#faf8ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#bdffdb",
                        "background": "#faf8ff",
                        "inverse-surface": "#2e3039",
                        "tertiary-fixed-dim": "#4edea3",
                        "tertiary-container": "#007d55",
                        "secondary-container": "#fea619",
                        "surface-container": "#ededf9",
                        "tertiary-fixed": "#6ffbbe",
                        "on-surface": "#191b23",
                        "on-tertiary": "#ffffff",
                        "secondary": "#855300",
                        "surface-tint": "#0053db",
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem",
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                        label: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    {% block css_extra %}{% endblock %}
    {% block head_extra %}{% endblock %}

    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script src="{% static 'js/scripts.js' %}" defer></script>
</head>
<body class="bg-surface font-body text-on-surface">
    <a class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-md focus:bg-white focus:px-4 focus:py-2 focus:text-sm focus:font-semibold focus:text-slate-900" href="#contenido-principal">
        Saltar al contenido
    </a>

    {% include 'componentes/navbar.html' %}

    <main id="contenido-principal" class="flex-1">
        {% block contenido %}{% endblock %}
    </main>

    {% include 'componentes/footer.html' %}
</body>
</html>
